name: "Prepare package patch release"
on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        options:
        - opentelemetry-instrumentation-genai-anthropic
        - opentelemetry-instrumentation-google-genai
        - opentelemetry-instrumentation-genai-langchain
        - opentelemetry-instrumentation-genai-openai-agents
        - opentelemetry-instrumentation-genai-openai
        - opentelemetry-util-genai
        description: 'Package to prepare for patch release'
        required: true

permissions:
  contents: read

env:
  UV_FROZEN: "true"

run-name: "Prepare patch release: ${{ inputs.package }}"

jobs:
  prepare:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/prepare-package
        with:
          package: ${{ inputs.package }}
          release_type: patch
          otelbot-app-id: ${{ vars.OTELBOT_APP_ID }}
          otelbot-private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
