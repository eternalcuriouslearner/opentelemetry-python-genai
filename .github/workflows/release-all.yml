name: "Release all"
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

run-name: "Release all"

jobs:
  enumerate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.enumerate.outputs.packages }}
      ref: ${{ steps.release_ref.outputs.ref }}
    steps:
      - name: Set release ref
        id: release_ref
        run: echo "ref=${{ github.event.pull_request.merge_commit_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Verify manual dispatch runs on main
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "This workflow should only be run against main"
            exit 1
          fi

      - name: Enumerate packages ready for release
        id: enumerate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          packages=()
          while IFS= read -r package; do
            [[ -z "$package" ]] && continue
            version=$(./scripts/eachdist.py version --package "$package")
            if [[ "$version" == *.dev ]]; then
              echo "Skipping ${package}: version still has .dev suffix (${version})"
              continue
            fi
            tag="${package}==${version}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Skipping ${package}: tag ${tag} already exists"
              continue
            fi
            echo "Ready: ${package} v${version}"
            packages+=("$package")
          done < <(./scripts/eachdist.py list-release-packages)

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No packages ready for release"
            exit 1
          fi

          json=$(printf '%s\n' "${packages[@]}" | jq -R . | jq -s -c .)
          echo "packages=${json}" >> "$GITHUB_OUTPUT"

  build:
    needs: enumerate
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.enumerate.outputs.packages) }}
    uses: ./.github/workflows/_release-build.yml
    with:
      package: ${{ matrix.package }}
      ref: ${{ needs.enumerate.outputs.ref }}
      on_main: true

  publish:
    needs: [enumerate, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.enumerate.outputs.packages) }}
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ matrix.package }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  finalize:
    needs: [enumerate, publish]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.enumerate.outputs.packages) }}
    uses: ./.github/workflows/_release-finalize.yml
    with:
      package: ${{ matrix.package }}
      ref: ${{ needs.enumerate.outputs.ref }}
      on_main: true
      bump_after_release: false
    secrets: inherit

  bump-main:
    needs: [enumerate, publish, finalize]
    if: always() && needs.enumerate.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-github-bot.sh

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Bump released packages to next dev versions
        env:
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          PACKAGES_JSON: ${{ needs.enumerate.outputs.packages }}
        run: |
          bumped=()
          while IFS= read -r package; do
            [[ -z "$package" ]] && continue
            version=$(./scripts/eachdist.py version --package "$package")
            tag="${package}==${version}"
            if ! gh release view "$tag" >/dev/null 2>&1; then
              echo "Skipping ${package}: release tag ${tag} not found"
              continue
            fi
            if [[ "$version" == *.dev ]]; then
              echo "Skipping ${package}: already bumped to ${version}"
              continue
            fi
            ./scripts/bump_package_minor_version.sh "$package"
            bumped+=("$package")
          done < <(echo "$PACKAGES_JSON" | jq -r '.[]')

          if [[ ${#bumped[@]} -eq 0 ]]; then
            echo "No packages to bump"
            exit 0
          fi

          message="Bump packages to next dev versions after release"
          body="Bump packages to the next \`.dev\` version after release:\n\n$(printf '%s\n' "${bumped[@]}")"
          branch="otelbot/bump-after-release-all-$(date +%Y%m%d)"

          git commit -a -m "$message"
          git push origin HEAD:"$branch"
          gh pr create --title "$message" \
                       --body "$body" \
                       --head "$branch" \
                       --base main
